name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate-public-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python --version

      - name: Validate public shell contracts, examples, and utilities
        run: python scripts/validate_public_shell.py
          PY
